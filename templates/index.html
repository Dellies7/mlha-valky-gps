<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlha Války - GO Edice</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #444; text-align: center; width: 80%; max-width: 300px; color: white; }
        .login-box h2 { margin-top: 0; color: #00d2ff; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        .login-btn, .register-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .login-btn { background: #00d2ff; color: #000; }
        .register-btn { background: #444; color: #fff; }
        #login-zprava { color: #ff4c4c; font-weight: bold; margin-bottom: 0; }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background-color: #06060a; color: #fff; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; background: #000; }
        
        .top-panel { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(14, 15, 26, 0.93); padding: 12px 22px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; gap: 6px; backdrop-filter: blur(15px); border: 1px solid rgba(0, 229, 255, 0.3); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7); min-width: 450px; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
        .level-badge { background: linear-gradient(135deg, #00e5ff, #00a1ff); padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .distance-badge { font-weight: 700; color: #00e676; font-size: 0.85rem; }
        .coin-badge { font-weight: 800; color: #ffea00; font-size: 0.95rem; display: flex; align-items: center; gap: 5px; text-shadow: 0 0 8px rgba(255, 234, 0, 0.6); transition: transform 0.3s; }
        
        .panel-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.12); color: #fff; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; text-transform: uppercase; }
        .panel-btn:hover { background: rgba(0, 229, 255, 0.1); border-color: #00e5ff; }
        .panel-btn.active { background: #ff1744; border-color: #ff1744; box-shadow: 0 0 15px rgba(255, 23, 68, 0.5); }

        .xp-container { width: 100%; margin-top: 2px; }
        .xp-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .xp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00e5ff, #00e676); transition: width 0.4s; }
        .xp-text { font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); font-weight: 600; margin-top: 4px; text-align: center; }

        .side-panel { position: absolute; top: 0; right: -420px; width: 400px; height: 100%; background: rgba(8, 8, 14, 0.98); z-index: 15; transition: right 0.3s ease; backdrop-filter: blur(20px); border-left: 1px solid rgba(0, 229, 255, 0.2); display: flex; flex-direction: column; }
        .side-panel.open { right: 0; }
        .panel-header { padding: 22px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { margin: 0; font-size: 1.1rem; color: #00e5ff; text-transform: uppercase; letter-spacing: 1px; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }

        .avatar-render-box { background: radial-gradient(circle, #101026 0%, #040408 100%); border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.15); height: 280px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        .preview-badge { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: #ffea00; color: #000; font-size: 0.65rem; font-weight: 900; padding: 4px 12px; border-radius: 10px; display: none; box-shadow: 0 0 10px rgba(255, 234, 0, 0.5); letter-spacing: 0.5px; z-index: 5; }
        .clear-preview-btn { position: absolute; bottom: 12px; right: 12px; background: #ff1744; color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 2px 8px rgba(255, 23, 68, 0.4); text-transform: uppercase; z-index: 5; }
        .hero-vector { width: 160px; height: 220px; }

        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes auraPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.15); opacity: 0.8; } }
        @keyframes petFlyAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .pet-flying { animation: petFlyAnim 2s infinite ease-in-out; }
        @keyframes petGroundAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        .pet-ground { animation: petGroundAnim 3s infinite ease-in-out; }
        .avatar-breathe { animation: breathe 3s ease-in-out infinite; transform-origin: bottom center; }

        .custom-leaflet-avatar { background: transparent; border: none; }
        .pogo-marker-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .pogo-pulse-ring { position: absolute; top: 20px; width: 85px; height: 85px; border: 3px solid #00e5ff; border-radius: 50%; background: rgba(0, 229, 255, 0.05); animation: pogoPulse 2.2s infinite ease-out; pointer-events: none; z-index: 1; }
        @keyframes pogoPulse { 0% { transform: scale(0.3); opacity: 1; border-width: 4px; } 100% { transform: scale(1.8); opacity: 0; border-width: 1px; } }
        .pogo-avatar-body { position: absolute; z-index: 2; bottom: 20px; transform: scale(0.48); transform-origin: bottom center; }

        .loot-marker { display: flex; justify-content: center; align-items: center; font-size: 1.8rem; filter: drop-shadow(0 0 10px #ffea00); animation: floatLoot 2s infinite ease-in-out; pointer-events: none; }
        @keyframes floatLoot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        #toast { visibility: hidden; min-width: 250px; background: rgba(20, 20, 30, 0.95); color: #ffea00; text-align: center; border-radius: 30px; padding: 12px 20px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 0.9rem; font-weight: bold; border: 1px solid #ffea00; box-shadow: 0 0 15px rgba(255, 234, 0, 0.3); }
        #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 3.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #adOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .ad-spinner { border: 6px solid #333; border-top: 6px solid #00e5ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .rewarded-ad-btn { background: linear-gradient(135deg, #f50057, #ff4081); border: 1px solid #ff80ab; width: 100%; padding: 12px; border-radius: 12px; color: #fff; font-weight: bold; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(245, 0, 87, 0.4); transition: all 0.2s; }
        .rewarded-ad-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 0, 87, 0.6); }

        .wardrobe-section-title { font-size: 0.75rem; text-transform: uppercase; color: #00e5ff; letter-spacing: 2px; margin: 18px 0 8px 0; font-weight: 800; }
        .wardrobe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .wardrobe-item { background: #111118; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; text-align: center; transition: all 0.2s; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 125px; }
        .wardrobe-item:hover { background: #151524; border-color: rgba(0, 229, 255, 0.4); }
        .wardrobe-item.equipped { border-color: #00e676; background: rgba(0, 230, 118, 0.08); box-shadow: 0 0 10px rgba(0, 230, 118, 0.15); }
        .wardrobe-item.locked { opacity: 0.3; cursor: not-allowed; }
        .wardrobe-item.premium-locked { border-color: #ffea00; background: rgba(255, 234, 0, 0.04); }
        .wardrobe-item .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 2px 5px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: 11px; color: #111; }
        .wardrobe-item .item-name { font-size: 0.65rem; font-weight: 600; color: rgba(255,255,255,0.8); display: block; margin-top: 4px; margin-bottom: 4px; min-height: 18px; line-height: 1.2; }
        .lock-lvl { position: absolute; top: 4px; right: 6px; font-size: 0.6rem; color: #ff1744; font-weight: 800; }
        .item-actions { display: flex; gap: 4px; width: 100%; margin-top: auto; }
        .buy-btn, .equip-btn, .unequip-btn, .preview-btn { border: none; border-radius: 6px; padding: 6px 2px; font-size: 0.6rem; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: center; }
        .buy-btn { background: #ffea00; color: #000; flex: 2; }
        .equip-btn { background: #00e5ff; color: #000; flex: 2; }
        .unequip-btn { background: #ff1744; color: #fff; flex: 2; }
        .preview-btn { background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); flex: 1; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; }
        .preview-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: #fff; }
        .preview-btn.active { background: #ffea00; color: #000; border-color: #ffea00; box-shadow: 0 0 8px rgba(255, 234, 0, 0.4); }
        .buy-btn:hover, .equip-btn:hover, .unequip-btn:hover { filter: brightness(1.15); }

        .stroj-btn { width: 100%; margin-bottom: 10px; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #111118; color: #fff; cursor: pointer; text-align: left; transition: all 0.2s; }
        .stroj-btn:hover:not(:disabled) { border-color: #00e5ff; background: #151524; }
        .stroj-btn.active { border-color: #00e676; background: rgba(0, 230, 118, 0.1); box-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }
        .stroj-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .leaflet-top { top: 100px; }
        .leaflet-marker-icon { transition: transform 1.5s linear; }

        @media (max-width: 600px) {
            .top-panel { min-width: 95%; width: 95%; padding: 8px 12px; top: 10px; }
            .stats-row { gap: 5px; flex-wrap: wrap; justify-content: center; }
            .panel-btn { padding: 6px 8px; font-size: 0.65rem; }
            .level-badge, .distance-badge, .coin-badge { font-size: 0.75rem; }
            .side-panel { width: 100%; right: -100%; }
            .side-panel.open { right: 0; }
            .avatar-render-box { height: 180px; margin-bottom: 10px; }
            .wardrobe-grid { grid-template-columns: repeat(2, 1fr); }
            .login-box { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Mlha Války</h2>
            <input type="text" id="login-jmeno" placeholder="Tvoje jméno">
            <input type="password" id="login-heslo" placeholder="Tvoje heslo">
            <button onclick="prihlasitSe()" class="login-btn">Přihlásit se</button>
            <button onclick="registrovatSe()" class="register-btn">Nová registrace</button>
            <p id="login-zprava"></p>
        </div>
    </div>

    <div id="kniha-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9998; justify-content: center; align-items: center; font-family: sans-serif;">
        <div class="login-box" style="width: 90%; max-width: 400px;">
            <h2 id="kniha-nazev">Vrcholová kniha</h2>
            <div id="kniha-zapisy" style="max-height: 250px; overflow-y: auto; text-align: left; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 8px; font-size: 14px;"></div>
            <input type="text" id="kniha-novy-vzkaz" placeholder="Napiš svůj vzkaz...">
            <button onclick="ulozitVzkaz()" class="login-btn">Zapsat do knihy</button>
            <button onclick="zavritKnihu()" class="register-btn">Zavřít knihu</button>
        </div>
    </div>

    <div id="map"></div>
    <div id="toast"></div>

    <div id="adOverlay">
        <div class="ad-spinner"></div>
        <div class="ad-text" style="color:#fff;">Přehrávám video od sponzora...</div>
        <div class="ad-countdown" id="adTimer" style="color:#ffea00; font-size: 2rem;">5</div>
    </div>

    <div class="top-panel">
        <div class="stats-row">
            <button class="panel-btn" onclick="togglePanel('denikPanel')"><i class="fas fa-book-open"></i> Deník</button>
            <button class="panel-btn" onclick="togglePanel('bankPanel')"><i class="fas fa-university"></i> Banka</button>
            <button class="panel-btn" onclick="togglePanel('garazPanel')"><i class="fas fa-motorcycle"></i> Garáž</button>
            <button class="panel-btn" onclick="togglePanel('wardrobePanel')"><i class="fas fa-store"></i> Obchod</button>
            <div class="level-badge" id="levelBadge">LVL 1</div>
            <div class="distance-badge" id="distanceBadge">0.00 KM</div>
            <div class="coin-badge" id="coinAmount"><i class="fas fa-coins"></i> <span>0</span></div>
            <button class="panel-btn" id="gpsBtn" onclick="toggleGPS()">GPS</button>
            <button class="panel-btn" onclick="odhlasitSe()" style="background: #ff1744; border-color: #ff1744;" title="Odhlásit se"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="xp-container">
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBar"></div></div>
            <div class="xp-text" id="xpText">0 / 500 XP</div>
        </div>
    </div>

    <div class="side-panel" id="wardrobePanel">
        <div class="panel-header">
            <h2>Obchod, Styl a VIP</h2>
            <button class="panel-btn" onclick="togglePanel('wardrobePanel')">X</button>
        </div>
        <div class="panel-content">
            <div class="avatar-render-box" id="avatarBigPreviewBox">
                <div class="preview-badge" id="previewBadge">MÓD NÁHLEDU</div>
                <button class="clear-preview-btn" id="clearPreviewBtn" onclick="vymazNahled(event)">Zrušit náhled</button>
                <div id="avatarBigPreview"></div>
            </div>
            <button class="rewarded-ad-btn" onclick="spustitReklamu()">
                <i class="fas fa-play-circle"></i> Získat +500 zlaťáků (Test)
            </button>
            <div id="wardrobeContent"></div>
        </div>
    </div>

    <div class="side-panel" id="denikPanel">
        <div class="panel-header">
            <h2>Deník výprav</h2>
            <button class="panel-btn" onclick="togglePanel('denikPanel')">X</button>
        </div>
        <div class="panel-content" id="milnikyContent"></div>
    </div>

    <div class="side-panel" id="bankPanel">
        <div class="panel-header">
            <h2>Místní Banka</h2>
            <button class="panel-btn" onclick="togglePanel('bankPanel')">X</button>
        </div>
        <div class="panel-content" id="bankaContent"></div>
    </div>

    <div class="side-panel" id="garazPanel">
        <div class="panel-header">
            <h2>Garáž</h2>
            <button class="panel-btn" onclick="togglePanel('garazPanel')">X</button>
        </div>
        <div class="panel-content" id="garazContent"></div>
    </div>

    <script>
        var prihlasenyUzivatelId = null;
        var aktualniZajimavostId = null;
        
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([48.8015, 14.2925], 16);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(map);

        var fogLayer = L.layerGroup().addTo(map);
        var lootLayer = L.layerGroup().addTo(map); 
        var userMarker = null;
        var watchId = null;
        var isTracking = false;

        var hracLevel = 1; var hracXp = 0; var hracXpPotreba = 500; var hracCelkemXp = 0;
        var celkovaVzdalenost = 0.0; var hracMince = 0; var hracZakoupene = [];
        var hracAktivniBuffy = {}; var hracVybaveni = {};
        
        var odemceneMilnikyHrace = [];
        var denniStav = {truhly: 0, nakupy: 0, zapisy: 0, odmena_vybrana: 0};
        var hracArtefakty = [];
        var bankaStav = {zainvestovano: 0, lze_vybrat: false};
        
        var hracDily = [];
        var aktualniStroj = "pesi";
        
        var predmetySef = {{ predmety|tojson|default('[]') }};
        var vsechnyMilniky = {{ milniky|tojson|default('[]') }};
        var artefaktySef = {{ artefakty|tojson|default('[]') }};
        var dilySef = {{ dily|tojson|default('[]') }}; 
        var nahledVybaveni = null; 

        function showToast(msg) {
            var x = document.getElementById("toast");
            x.innerText = msg; x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3800);
        }

        function spustitReklamu() {
            var overlay = document.getElementById('adOverlay');
            var timerEl = document.getElementById('adTimer');
            overlay.style.display = 'flex';
            var timeLeft = 5; timerEl.innerText = timeLeft;
            var countdown = setInterval(function() {
                timeLeft--; timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown); overlay.style.display = 'none';
                    vyberOdmenu(500, "📺 TESTOVACÍ ODMĚNA! Získáváš +500 zlaťáků.");
                }
            }, 1000);
        }

        function obnovStavHrace() {
            if (!prihlasenyUzivatelId) return;
            fetch('/api/stav?user_id=' + prihlasenyUzivatelId)
            .then(res => res.json())
            .then(data => {
                hracLevel = data.level; hracXp = data.xp; hracXpPotreba = data.xp_potreba; hracCelkemXp = data.celkem_xp;
                celkovaVzdalenost = data.vzdalenost; hracMince = data.mince; hracZakoupene = data.zakoupene;
                hracAktivniBuffy = data.aktivni_buffy; hracVybaveni = data.vybaveni;
                odemceneMilnikyHrace = data.odemcene_milniky;
                denniStav = data.denni_stav;
                hracArtefakty = data.nalezene_artefakty;
                bankaStav = data.banka_stav;
                hracDily = data.nalezene_dily || [];
                aktualniStroj = data.aktivni_stroj || "pesi";
                aktualizujRozhrani();
            });
        }

        function registrovatSe() {
            var jmeno = document.getElementById('login-jmeno').value;
            var heslo = document.getElementById('login-heslo').value;
            fetch('/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jmeno: jmeno, heslo: heslo })
            }).then(res => res.json()).then(data => {
                var zprava = document.getElementById('login-zprava');
                if (data.chyba) { zprava.style.color = '#ff4c4c'; zprava.innerText = data.chyba; } 
                else { zprava.style.color = '#4cff4c'; zprava.innerText = "Super! Teď se můžeš přihlásit."; }
            });
        }

        function prihlasitSe() {
            var jmeno = document.getElementById('login-jmeno').value;
            var heslo = document.getElementById('login-heslo').value;
            fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jmeno: jmeno, heslo: heslo })
            }).then(res => res.json()).then(data => {
                var zprava = document.getElementById('login-zprava');
                if (data.chyba) { zprava.innerText = data.chyba; } 
                else {
                    prihlasenyUzivatelId = data.user_id;
                    localStorage.setItem('hrac_id', data.user_id);
                    document.getElementById('login-screen').style.display = 'none';
                    obnovStavHrace(); nactiHraceAMapu(); nactiZajimavosti();
                }
            });
        }

        function odhlasitSe() {
            localStorage.removeItem('hrac_id');
            location.reload();
        }

        window.addEventListener('load', function() {
            var ulozeneId = localStorage.getItem('hrac_id');
            if (ulozeneId) {
                prihlasenyUzivatelId = ulozeneId;
                document.getElementById('login-screen').style.display = 'none';
                obnovStavHrace(); nactiHraceAMapu(); nactiZajimavosti();
            }
        });

        // --- ZTRACENÉ FUNKCE PRO GPS, MAPU A ZÁPISNÍK JSOU ZPĚT! ---
        function nactiHraceAMapu() {
            if (!prihlasenyUzivatelId) return;
            fetch('/api/body?user_id=' + prihlasenyUzivatelId)
            .then(res => res.json())
            .then(data => {
                if (data.body && data.body.length > 0) {
                    prekresliMlhu(data.body);
                    var posledni = data.body[data.body.length - 1];
                    if (!userMarker) {
                        userMarker = L.marker([posledni[0], posledni[1]], {icon: ziskejIkonyHrace()}).addTo(map);
                        map.setView([posledni[0], posledni[1]], 16);

        function toggleGPS() {
            var btn = document.getElementById('gpsBtn');
            if (isTracking) {

                isTracking = false;
                btn.classList.remove('active');
                btn.innerText = 'GPS';
                showToast("📡 GPS sledování vypnuto.");
            } else {
                if ("geolocation" in navigator) {
                    isTracking = true;
                    btn.classList.add('active');
                    btn.innerText = 'GPS ZAP';
                    showToast("📡 Hledám signál GPS...");
                    watchId = navigator.geolocation.watchPosition(
                        function(position) {
                            var lat = position.coords.latitude;
                            var lng = position.coords.longitude;
                            
                            if (!userMarker) {
                                userMarker = L.marker([lat, lng], {icon: ziskejIkonyHrace()}).addTo(map);
                                map.setView([lat, lng], 18);
                            } else {
                                userMarker.setLatLng([lat, lng]);
                                map.panTo([lat, lng]);
                            }
                            
                            fetch('/api/ulozit', {
                                method: 'POST', headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({lat: lat, lng: lng, user_id: prihlasenyUzivatelId})
                            }).then(res => res.json()).then(data => {

                                    prekresliMlhu(data.vsechny_body);

                                    celkovaVzdalenost = data.stav.vzdalenost; hracMince = data.stav.mince; hracZakoupene = data.stav.zakoupene;
                                    hracAktivniBuffy = data.stav.aktivni_buffy; hracVybaveni = data.stav.vybaveni;

                                    aktualizujRozhrani();
                                }
                            });
                            
                            doplňLoot(lat, lng);
                            zkontrolujKolizeSLootem(lat, lng);
                        }, 
                        function(error) {
                            showToast("Chyba GPS: " + error.message);
                            isTracking = false;
                            btn.classList.remove('active');
                            btn.innerText = 'GPS';
                        }, 
                        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
                    );

            }

        function doplňLoot(lat, lng) {
            var hracPoloha = L.latLng(lat, lng);
            lootLayer.eachLayer(function(marker) {
                if (hracPoloha.distanceTo(marker.getLatLng()) > 2500) { lootLayer.removeLayer(marker); }
            });
            var maxLootu = hracAktivniBuffy['m_radar'] !== undefined ? 30 : 15; 
            var pocet = lootLayer.getLayers().length;
            
            if (pocet < maxLootu) {
                var chybi = maxLootu - pocet;
                for (var i=0; i<chybi; i++) {
                    var vzdalenostMetry = 200 + (Math.random() * 1300);
                    var uhel = Math.random() * Math.PI * 2;
                    var offsetLat = (vzdalenostMetry / 111320) * Math.cos(uhel);
                    var offsetLng = (vzdalenostMetry / (111320 * Math.cos(lat * Math.PI / 180))) * Math.sin(uhel);
                    
                    var sanceArtefakt = hracAktivniBuffy['m_art_radar'] !== undefined ? 0.30 : 0.15;
                    var sanceDil = hracAktivniBuffy['m_stroj_radar'] !== undefined ? 0.30 : 0.15;
                    
                    var rnd = Math.random();
                    var isArtefakt = (hracLevel >= 6 && rnd < sanceArtefakt);
                    var isDil = (hracLevel >= 8 && !isArtefakt && rnd < (sanceArtefakt + sanceDil));
                    
                    var iconHtml = '<div style="font-size:30px;">🎁</div>';
                    if (isArtefakt) iconHtml = '<div style="font-size:30px; filter: drop-shadow(0 0 10px #ff3d00);">🏺</div>';
                    else if (isDil) iconHtml = '<div style="font-size:30px; filter: drop-shadow(0 0 10px #00e5ff);">⚙️</div>';
                    
                    var chest = L.marker([lat + offsetLat, lng + offsetLng], { 
                        icon: L.divIcon({ className: 'loot-marker', html: iconHtml, iconSize: [40, 40] }) 
                    });
                    
                    chest.property('itemType', isArtefakt ? 'artefakt' : (isDil ? 'dil' : 'chest'));
                    chest.addTo(lootLayer);
                }
            }
        }

        L.Marker.include({ property: function(id, val) { if(val === undefined) return this.options[id]; this.options[id] = val; return this; } });

        function zkontrolujKolizeSLootem(lat, lng) {
            var hracPoloha = L.latLng(lat, lng);
            var polomerSberu = hracAktivniBuffy['m_magnet'] !== undefined ? 60 : 30; 
            lootLayer.eachLayer(function(marker) {
                if (hracPoloha.distanceTo(marker.getLatLng()) < polomerSberu) { 
                    var typLootu = marker.property('itemType');
                    lootLayer.removeLayer(marker); 
                    
                    if (typLootu === 'artefakt') {
                        fetch('/api/sebrat_artefakt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({user_id: prihlasenyUzivatelId}) })
                        .then(res => res.json()).then(data => { obnovStavHrace(); showToast(data.zprava); });
                    } else if (typLootu === 'dil') {
                        fetch('/api/sebrat_dil', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({user_id: prihlasenyUzivatelId}) })
                        .then(res => res.json()).then(data => { obnovStavHrace(); showToast(data.zprava); });
                    } else {
                        var nasobitel = hracAktivniBuffy['m_double'] !== undefined ? 2 : 1;
                        vyberOdmenu(20 * nasobitel, nasobitel === 2 ? "📦 Našla jsi truhlu! +40 zlaťáků (2x BONUS)" : "📦 Našla jsi truhlu! +20 zlaťáků");
                    }
                }
            });
        }

        function vyberOdmenu(hodnota, zprava) {
            fetch('/api/vybrat_odmenu', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({hodnota: hodnota, user_id: prihlasenyUzivatelId}) })
            .then(res => res.json()).then(data => {
                obnovStavHrace();
                showToast(zprava);
                document.getElementById('coinAmount').style.transform = 'scale(1.5)';
                setTimeout(() => document.getElementById('coinAmount').style.transform = 'scale(1)', 300);
            });
        }

        function akceBanka(akce) {
            var castka = 0;

        function vykresliGaraz() {
            var box = document.getElementById('garazContent');
            var html = '';
            
            if (hracLevel < 8) {
                html += `
                    <div style="background: rgba(255, 23, 68, 0.1); border: 1px dashed #ff1744; padding: 15px; text-align: center; border-radius: 10px; color: #ff1744; margin-top: 20px;">
                        <i class="fas fa-lock" style="font-size: 1.5rem; margin-bottom: 8px;"></i><br>
                        <b>Odemkne se na Levelu 8</b><br>
                        <span style="font-size: 0.75rem; color: #888;">Garáž je zatím zavřená. Jakmile dosáhneš 8. levelu, začneš v mlze nacházet mechanické součástky ke složení vlastních strojů.</span>
                    </div>`;
            } else if (hracDily.length < dilySef.length) {
                html += '<div style="color: #aaa; font-size: 0.85rem; margin-bottom: 15px;">Sesbírej všechny díly ztracené v mlze a otevři si vozový park. (Duplikáty můžeš rovnou prodávat!)</div>';
                
                var dilyHtml = "";
                dilySef.forEach(d => {
                    var maDil = hracDily.includes(d.id);
                    var ramBarva = maDil ? "#00e5ff" : "#333";
                    var nadpisBarva = maDil ? "#fff" : "#666";
                    var ikonaStav = maDil ? "none" : "grayscale(100%) opacity(0.3)";
                    
                    dilyHtml += `
                        <div style="background: #111118; border: 1px solid ${ramBarva}; padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; align-items: center; gap: 12px;">
                            <div style="font-size: 28px; filter: ${ikonaStav};">${d.ikona}</div>
                            <div style="color: ${nadpisBarva}; font-weight: bold; font-size: 0.9rem;">${d.nazev}</div>
                            <div style="margin-left: auto; color: ${maDil ? '#00e676' : '#ff1744'};"><i class="fas ${maDil ? 'fa-check' : 'fa-times'}"></i></div>
                        </div>
                    `;
                });
                html += dilyHtml;
                html += `<div style="text-align: center; color: #ffea00; font-weight: bold; margin-top: 15px;">Sebráno: ${hracDily.length} / ${dilySef.length} dílů</div>`;
            } else {
                html += '<div class="wardrobe-section-title">Tvůj vozový park</div>';
                html += '<div style="color: #aaa; font-size: 0.75rem; margin-bottom: 15px;">Díky sebraným součástkám jsi odemkla garáž. Vyber si stroj na cestu!</div>';
                
                var definiceStroju = {
                    "pesi": {"nazev": "Pěší chůze", "bonus": 1.0, "req": 1, "ikona": "🚶"},
                    "ctyrkolka": {"nazev": "Terénní čtyřkolka", "bonus": 1.5, "req": 8, "ikona": "🚜"},
                    "bugina": {"nazev": "Rychlá bugina", "bonus": 2.0, "req": 10, "ikona": "🏎️"},
                    "vznasedlo": {"nazev": "Vznášedlo", "bonus": 2.5, "req": 12, "ikona": "🛸"}
                };

                Object.keys(definiceStroju).forEach(id => {
                    var s = definiceStroju[id];
                    var splneno = hracLevel >= s.req;
                    var aktivni = (aktualniStroj === id);
                    
                    html += `
                        <button class="stroj-btn ${aktivni ? 'active' : ''}" 
                                ${!splneno ? 'disabled' : ''} 
                                onclick="vybratStroj('${id}')">
                            <div style="font-size: 1.5rem; margin-bottom: 5px;">${s.ikona} ${s.nazev}</div>
                            <div style="font-size: 0.75rem; color: ${aktivni ? '#00e5ff' : '#aaa'};">
                                Bonus: ${s.bonus}x XP ${!splneno ? `| Odemkne se na Lvl ${s.req}` : ''}
                                ${aktivni ? '<br><b style="color: #00e676;">(Aktivní)</b>' : ''}
                            </div>
                        </button>
                    `;
                });
            }
            box.innerHTML = html;
        }

        function vybratStroj(strojId) {
            fetch('/api/vybrat_stroj', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: prihlasenyUzivatelId, stroj_id: strojId })
            }).then(res => res.json()).then(data => {
                if (data.status === "success") {
                    showToast(data.zprava);
                    obnovStavHrace();
                } else {
                    alert(data.zprava);
                }
            });
        }

        function vykresliJednuMisi(nazev, popis, aktualni, cil) {
            var hotovo = aktualni >= cil;
            var barva = hotovo ? "#00e676" : "#00d2ff";
            var proc = (aktualni / cil) * 100;
            return `
                <div style="background: #111118; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid ${barva};">
                    <div style="display:flex; justify-content:space-between; font-size: 0.8rem;">
                        <b>${nazev}</b> <span style="color:${barva}; font-weight:bold;">${aktualni}/${cil}</span>
                    </div>
                    <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">${popis}</div>
                    <div style="width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden;">
                        <div style="height: 100%; width: ${proc}%; background: ${barva};"></div>
                    </div>
                </div>
            `;
        }

        function vykresliDenik() {
            var box = document.getElementById('milnikyContent');
            var html = '<div class="wardrobe-section-title">Dlouhodobé milníky</div>';
            
            vsechnyMilniky.forEach(m => {
                var splneno = odemceneMilnikyHrace.includes(m.id);
                var barva = splneno ? "#00e676" : "#444";
                var ikona = splneno ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-lock"></i>';
                
                html += `
                    <div style="background: #111118; border-left: 4px solid ${barva}; padding: 10px; margin-bottom: 8px; border-radius: 6px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <b style="color: ${splneno ? '#fff' : '#888'};">${m.nazev}</b>
                            <span style="color: ${barva};">${ikona}</span>
                        </div>
                        <div style="font-size: 12px; color: #666; margin-top: 4px;">${m.popis}</div>
                        <div style="font-size: 11px; color: #00d2ff; margin-top: 4px; font-weight: bold;">+${m.xp_odmena} XP</div>
                    </div>
                `;
            });

            html += '<div class="wardrobe-section-title" style="margin-top: 25px;">Denní mise</div>';
            if (hracLevel < 3) {
                html += `
                    <div style="background: rgba(255, 23, 68, 0.1); border: 1px dashed #ff1744; padding: 15px; text-align: center; border-radius: 10px; color: #ff1744;">
                        <i class="fas fa-lock" style="font-size: 1.5rem; margin-bottom: 8px;"></i><br>
                        <b>Odemkne se na Levelu 3</b><br>
                        <span style="font-size: 0.75rem; color: #888;">Získávej XP průzkumem, ať získáš přístup k denním výzvám.</span>
                    </div>`;
            } else {
                var t = Math.min(denniStav.truhly, 3);
                var n = Math.min(denniStav.nakupy, 1);
                var z = Math.min(denniStav.zapisy, 1);
                var hotovo_vse = (t === 3 && n === 1 && z === 1);
                
                html += vykresliJednuMisi("Hledač", "Najdi a otevři dnes 3 truhly v mlze", t, 3);
                html += vykresliJednuMisi("Sběratel", "Kup nebo aktivuj si dnes něco v obchodě", n, 1);
                html += vykresliJednuMisi("Průzkumník", "Zapiš se dnes do libovolné vrcholové knihy", z, 1);
                
                if (hotovo_vse && denniStav.odmena_vybrana === 0) {
                    html += `<button onclick="vybratDenniOdmenu()" style="width:100%; padding: 12px; background: #00e676; color:#000; font-weight:bold; border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-size: 1rem;"><i class="fas fa-gift"></i> Vyzvednout 500 zlaťáků!</button>`;
                } else if (denniStav.odmena_vybrana === 1) {
                    html += `<div style="text-align:center; padding:10px; color:#00e676; font-weight:bold;"><i class="fas fa-check"></i> Denní odměna vybrána! Další úkoly zítra.</div>`;
                }
            }

            html += '<div class="wardrobe-section-title" style="margin-top: 25px;">Nalezené artefakty</div>';
            if (hracLevel < 6) {
                html += `
                    <div style="background: rgba(255, 23, 68, 0.1); border: 1px dashed #ff1744; padding: 15px; text-align: center; border-radius: 10px; color: #ff1744;">
                        <i class="fas fa-lock" style="font-size: 1.5rem; margin-bottom: 8px;"></i><br>
                        <b>Odemkne se na Levelu 6</b><br>
                        <span style="font-size: 0.75rem; color: #888;">Tajemství ukrytá v mlze se zjeví až velmi zkušeným pátračům.</span>
                    </div>`;
            } else {
                var artefaktyHtml = "";
                artefaktySef.forEach(a => {
                    var maArtefakt = hracArtefakty.includes(a.id);
                    var ramBarva = maArtefakt ? "#ffea00" : "#333";
                    var nadpisBarva = maArtefakt ? "#fff" : "#666";
                    var textArtefaktu = maArtefakt ? a.nazev : "???";
                    var popisArtefaktu = maArtefakt ? a.popis : "Musíš ho nejprve najít v mlze.";
                    var ikonaStav = maArtefakt ? "none" : "grayscale(100%) opacity(0.3)";
                    
                    artefaktyHtml += `
                        <div style="background: #111118; border: 1px solid ${ramBarva}; padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; align-items: center; gap: 12px;">
                            <div style="font-size: 28px; filter: ${ikonaStav};">${a.ikona}</div>
                            <div>
                                <div style="color: ${nadpisBarva}; font-weight: bold; font-size: 0.9rem;">${textArtefaktu}</div>
                                <div style="color: #888; font-size: 0.75rem; margin-top: 3px;">${popisArtefaktu}</div>
                            </div>
                        </div>
                    `;
                });
                html += artefaktyHtml;
            }

            box.innerHTML = html;
        }

        function vybratDenniOdmenu() {
            fetch('/api/vybrat_denni_odmenu', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: prihlasenyUzivatelId })
            }).then(res => res.json()).then(data => {
                if (data.status === "success") {
                    showToast("🎉 Denní mise splněny! Získáváš 500 zlaťáků!");
                    obnovStavHrace();
                }
            });
        }

        function aktualizujRozhrani() {
            document.getElementById('levelBadge').innerText = "LVL " + hracLevel;
            
            var definiceStroju = {
                "pesi": {"bonus": 1.0, "ikona": "🚶"},
                "ctyrkolka": {"bonus": 1.5, "ikona": "🚜"},
                "bugina": {"bonus": 2.0, "ikona": "🏎️"},
                "vznasedlo": {"bonus": 2.5, "ikona": "🛸"}
            };
            var dataStroje = definiceStroju[aktualniStroj] || definiceStroju["pesi"];
            var zobrVz = (celkovaVzdalenost * dataStroje.bonus).toFixed(2);
            document.getElementById('distanceBadge').innerHTML = `${dataStroje.ikona} ${zobrVz} KM`;
            
            document.getElementById('xpBar').style.width = ((hracXp / hracXpPotreba) * 100) + "%";
            document.getElementById('xpText').innerText = hracXp + " / " + hracXpPotreba + " XP (Celkem " + hracCelkemXp + ")";
            document.querySelector('#coinAmount span').innerText = hracMince; 
            
            var hracVzhledData = nahledVybaveni ? nahledVybaveni : hracVybaveni;
            document.getElementById('avatarBigPreview').innerHTML = generujAvatarSVG(hracVzhledData);
            
            if (nahledVybaveni) { document.getElementById('previewBadge').style.display = 'block'; document.getElementById('clearPreviewBtn').style.display = 'block'; } 
            else { document.getElementById('previewBadge').style.display = 'none'; document.getElementById('clearPreviewBtn').style.display = 'none'; }
            if (userMarker) { userMarker.setIcon(ziskejIkonyHrace()); }
            
            vykresliWardrobe();
            vykresliDenik();
            vykresliBanku();
            vykresliGaraz();
        }

        function togglePanel(panelId) {
            var panely = ['wardrobePanel', 'denikPanel', 'bankPanel', 'garazPanel'];
            panely.forEach(id => {
                var el = document.getElementById(id);
                if (el) {
                    if (id === panelId) {
                        el.classList.toggle('open');
                        if (id === 'wardrobePanel') vymazNahled();
                    } else {
                        el.classList.remove('open');
                    }
                }
            });
        }

        function zobrazNahled(typ, itemId, event) {
            if (event) event.stopPropagation();
            if (!nahledVybaveni) { nahledVybaveni = Object.assign({}, hracVybaveni); }
            if (nahledVybaveni[typ] === itemId) { nahledVybaveni[typ] = hracVybaveni[typ]; } else { nahledVybaveni[typ] = itemId; }
            var jeStejny = true;
            for (var k in hracVybaveni) { if (nahledVybaveni[k] !== hracVybaveni[k]) { jeStejny = false; break; } }
            if (jeStejny) nahledVybaveni = null;
            aktualizujRozhrani();
        }

        function vymazNahled(event) {
            if (event) event.stopPropagation();
            nahledVybaveni = null; aktualizujRozhrani();
        }

        function wardrobeKoupit(itemId, cena, event) {
            event.stopPropagation();
            if (hracMince < cena) { alert("Nemáš dostatek mincí!"); return; }
            fetch('/api/koupit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ item_id: itemId, cena: cena, user_id: prihlasenyUzivatelId }) })
            .then(res => res.json()).then(data => {
                if (data.status === "success") {
                    if (data.vyhra !== undefined && data.vyhra !== null) { showToast(`🎲 Otevřela jsi truhlu! Získáváš ${data.vyhra} zlaťáků!`); } 
                    else { showToast("✨ Nákup byl úspěšný!"); }
                    nahledVybaveni = null;
                    obnovStavHrace();
                }
            });
        }

        function vykresliWardrobe() {
            var container = document.getElementById('wardrobeContent'); container.innerHTML = "";
            var sekce = { "hlava": "Pokrývka hlavy", "telo": "Svršky a oblečení", "ruka": "Vybavení do ruky", "aura": "Epické Aury", "mazlicek": "Mazlíčci", "mapa": "Vychytávky (na 60 min)", "consumable": "Truhly a Elixíry" };
            
            for (var klic in sekce) {
                container.innerHTML += `<div class="wardrobe-section-title">${sekce[klic]}</div>`;
                var grid = document.createElement('div'); grid.className = "wardrobe-grid";
                predmetySef.filter(p => p.typ === klic).forEach(p => {
                    var jeOdemcenLevel = hracLevel >= p.req_level;
                    var jeZakoupen = !p.premium || hracZakoupene.includes(p.id);
                    var jeNasazen = hracVybaveni[p.typ] === p.id;
                    var jeVNahledu = nahledVybaveni && nahledVybaveni[p.typ] === p.id;

                    var item = document.createElement('div');
                    item.className = `wardrobe-item ${jeNasazen ? 'equipped' : ''} ${!jeOdemcenLevel ? 'locked' : ''} ${p.premium && !jeZakoupen ? 'premium-locked' : ''}`;
                    if (jeVNahledu && !jeNasazen) { item.style.borderColor = "#ffea00"; item.style.boxShadow = "0 0 10px rgba(255, 234, 0, 0.3)"; }

                    var innerHTML = '';
                    var ikonkaVevnitr = p.ikona ? `<i class="${p.ikona}"></i>` : '';
                    innerHTML += `<div class="color-dot" style="background: ${p.barva}; display: flex; justify-content: center; align-items: center; font-size: 11px; color: #111;">${ikonkaVevnitr}</div>`;
                    innerHTML += `<span class="item-name">${p.nazev}</span>`;
                    if (!jeOdemcenLevel) { innerHTML += `<span class="lock-lvl">Lvl ${p.req_level}</span>`; }

                    var tlacitka = '<div class="item-actions">';
                    if (jeOdemcenLevel) {
                        if (klic === 'mapa') {
                            var maBuff = hracAktivniBuffy[p.id] !== undefined;
                            if (maBuff) { tlacitka += `<span style="font-size:0.6rem; color:#00e676; font-weight:bold; width:100%;">Aktivní (${Math.ceil(hracAktivniBuffy[p.id]/60)} m)</span>`; } 
                            else { tlacitka += `<button class="buy-btn" onclick="wardrobeKoupit('${p.id}', ${p.cena}, event)">Aktivovat ${p.cena}🪙</button>`; }
                        } else if (klic === 'consumable') { tlacitka += `<button class="buy-btn" onclick="wardrobeKoupit('${p.id}', ${p.cena}, event)">Koupit ${p.cena}🪙</button>`; } 
                        else {
                            if (!jeZakoupen) { tlacitka += `<button class="buy-btn" onclick="wardrobeKoupit('${p.id}', ${p.cena}, event)">Koupit ${p.cena}🪙</button>`; } 
                            else if (!jeNasazen) { tlacitka += `<button class="equip-btn" onclick="zmenObleceni('${p.typ}', '${p.id}', event)">Obléct</button>`; } 
                            else { tlacitka += `<button class="unequip-btn" onclick="zmenObleceni('${p.typ}', '', event)">Sundat</button>`; }
                            var activeClass = jeVNahledu ? 'active' : '';
                            tlacitka += `<button class="preview-btn ${activeClass}" onclick="zobrazNahled('${p.typ}', '${p.id}', event)"><i class="fas fa-eye"></i></button>`;
                        }
                    }
                    tlacitka += '</div>'; innerHTML += tlacitka; item.innerHTML = innerHTML; grid.appendChild(item);
                });
                container.appendChild(grid);
            }
        }

        function zmenObleceni(typ, itemId, event) {
            if(event) event.stopPropagation();
            fetch('/api/zmenit_obleceni', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ typ: typ, item_id: itemId, user_id: prihlasenyUzivatelId }) })
            .then(() => { obnovStavHrace(); });
        }

        aktualizujRozhrani();
    </script>
</body>
</html>
